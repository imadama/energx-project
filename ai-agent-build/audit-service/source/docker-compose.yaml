services:
  energx-audit:
    build: .
    container_name: energx-audit
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Mount voor GSC service account JSON (read-only)
      - ./credentials:/app/credentials:ro
    networks:
      - default
      - dify-network

# Externe Dify network zodat Dify-containers de service kunnen bereiken
# op http://energx-audit:8080 zonder via host
networks:
  default:
    driver: bridge
  dify-network:
    external: true
    name: docker_default  # pas aan naar jouw Dify-netwerk-naam
